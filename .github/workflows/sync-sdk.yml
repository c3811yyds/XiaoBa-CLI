name: Sync CatsCompany SDK

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update SDK
        run: |
          rm -rf vendor/cats-company
          git clone --depth 1 https://github.com/buildsense-ai/cats-company.git vendor/cats-company
          cd vendor/cats-company
          git log -1 --format="%H %ci" > VERSION
          cd ../..
          rm -rf vendor/cats-company/.git

      - name: Check for changes
        id: changes
        run: |
          git add vendor/cats-company
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync CatsCompany SDK to latest"
          git push
