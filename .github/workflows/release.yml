name: Desktop Release CD

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  NPM_INSTALL_FLAGS: '--prefer-offline --no-audit --fund=false'

jobs:
  build-mac:
    runs-on: macos-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (macOS)
        run: npm run electron:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml

  build-win:
    runs-on: windows-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (Windows)
        run: npm run electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  build-linux:
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libasound2t64

      - name: Build Electron app (Linux)
        run: npm run electron:build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    environment: cn_jiasu
    permissions:
      contents: write
    env:
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      TOS_SOURCE_BUCKET: github-hk
      TOS_SOURCE_REGION: cn-hongkong
      TOS_TARGET_BUCKET: github-release
      TOS_TARGET_REGION: cn-guangzhou
      XIAOBA_UPDATE_BASE_URL: https://github-release.tos-cn-guangzhou.volces.com/update
      AWS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XiaoBa ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-mac/*
            release-win/*
            release-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure AWS CLI is available
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version
          aws configure set default.s3.addressing_style virtual

      - name: Upload release payloads to Hong Kong source bucket
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          SOURCE_ENDPOINT_URL="https://tos-s3-${TOS_SOURCE_REGION}.volces.com"
          IMMUTABLE_CACHE_CONTROL="public, max-age=31536000, immutable"
          replicated_keys=()

          upload_source_file() {
            local source_file="$1"
            local target_key="$2"

            aws s3 cp "$source_file" "s3://${TOS_SOURCE_BUCKET}/$target_key" \
              --endpoint-url "$SOURCE_ENDPOINT_URL" \
              --cache-control "$IMMUTABLE_CACHE_CONTROL" \
              --only-show-errors
          }

          for file in release-mac/* release-win/* release-linux/*; do
            [ -f "$file" ] || continue

            name="$(basename "$file")"
            case "$name" in
              latest*.yml)
                continue
                ;;
            esac

            target_key="update/$name"
            upload_source_file "$file" "$target_key"
            replicated_keys+=("$target_key")
          done

          printf '%s\n' "${replicated_keys[@]}" > replicated-keys.txt

      - name: Wait for Guangzhou bucket replication
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          TARGET_ENDPOINT_URL="https://tos-s3-${TOS_TARGET_REGION}.volces.com"
          ATTEMPTS=36
          DELAY_SECONDS=10

          wait_for_target_object() {
            local key="$1"
            local attempt=1

            while [ "$attempt" -le "$ATTEMPTS" ]; do
              if aws s3api head-object \
                --bucket "$TOS_TARGET_BUCKET" \
                --key "$key" \
                --endpoint-url "$TARGET_ENDPOINT_URL" \
                >/dev/null 2>&1; then
                echo "Replicated: $key"
                return 0
              fi

              echo "Waiting for replicated object $key ($attempt/$ATTEMPTS)..."
              sleep "$DELAY_SECONDS"
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for replicated object: $key"
            return 1
          }

          while IFS= read -r key; do
            [ -n "$key" ] || continue
            wait_for_target_object "$key"
          done < replicated-keys.txt

      - name: Expose replicated payloads in Guangzhou bucket
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          TARGET_ENDPOINT_URL="https://tos-s3-${TOS_TARGET_REGION}.volces.com"

          while IFS= read -r key; do
            [ -n "$key" ] || continue

            aws s3api put-object-acl \
              --bucket "$TOS_TARGET_BUCKET" \
              --key "$key" \
              --acl public-read \
              --endpoint-url "$TARGET_ENDPOINT_URL" \
              >/dev/null
          done < replicated-keys.txt


      - name: Publish latest metadata to Guangzhou bucket
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          TARGET_ENDPOINT_URL="https://tos-s3-${TOS_TARGET_REGION}.volces.com"
          METADATA_CACHE_CONTROL="no-cache, no-store, must-revalidate, max-age=0"

          upload_metadata_file() {
            local source_file="$1"
            [ -f "$source_file" ] || return 0

            local name
            name="$(basename "$source_file")"

            aws s3 cp "$source_file" "s3://${TOS_TARGET_BUCKET}/update/$name" \
              --endpoint-url "$TARGET_ENDPOINT_URL" \
              --acl public-read \
              --cache-control "$METADATA_CACHE_CONTROL" \
              --only-show-errors
          }

          for file in release-mac/latest*.yml release-win/latest*.yml release-linux/latest*.yml; do
            upload_metadata_file "$file"
          done

      - name: Verify published update metadata
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != ''
        run: |
          set -euo pipefail

          for file in latest.yml latest-mac.yml latest-linux.yml; do
            url="${XIAOBA_UPDATE_BASE_URL}/$file"
            status="$(curl -I -L -s -o /dev/null -w "%{http_code}" "$url")"
            if [ "$status" != "200" ]; then
              echo "Metadata check failed for $url (HTTP $status)"
              exit 1
            fi
          done
