name: Desktop Release CD

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  NPM_INSTALL_FLAGS: '--prefer-offline --no-audit --fund=false'

jobs:
  build-mac:
    runs-on: macos-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (macOS)
        run: npm run electron:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml

  build-win:
    runs-on: windows-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Build Electron app (Windows)
        run: npm run electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  build-linux:
    runs-on: ubuntu-latest
    environment: cn_jiasu
    env:
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: .cache/runtime-downloads
          key: ${{ runner.os }}-${{ runner.arch }}-runtime-${{ hashFiles('scripts/runtime-manifest.json') }}

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Inject version into source
        run: node scripts/inject-version.js

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libasound2t64

      - name: Build Electron app (Linux)
        run: npm run electron:build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/latest-linux.yml

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    environment: cn_jiasu
    permissions:
      contents: write
    env:
      VOLC_TOS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      VOLC_TOS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      VOLC_TOS_BUCKET: ${{ secrets.VOLC_TOS_BUCKET }}
      VOLC_TOS_REGION: ${{ secrets.VOLC_TOS_REGION }}
      XIAOBA_UPDATE_BASE_URL: ${{ secrets.XIAOBA_UPDATE_BASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.VOLC_TOS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.VOLC_TOS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.VOLC_TOS_REGION }}
      AWS_EC2_METADATA_DISABLED: 'true'
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: release-mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XiaoBa ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-mac/*
            release-win/*
            release-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure AWS CLI is available
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != '' && env.VOLC_TOS_BUCKET != '' && env.VOLC_TOS_REGION != '' && env.XIAOBA_UPDATE_BASE_URL != ''
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version
          aws configure set default.s3.addressing_style virtual

      - name: Upload update artifacts to Volcengine TOS
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != '' && env.VOLC_TOS_BUCKET != '' && env.VOLC_TOS_REGION != '' && env.XIAOBA_UPDATE_BASE_URL != ''
        run: |
          set -euo pipefail

          ENDPOINT_URL="https://tos-s3-${VOLC_TOS_REGION}.volces.com"

          upload_file() {
            local source_file="$1"
            local target_key="$2"
            local cache_control="$3"

            aws s3 cp "$source_file" "s3://${VOLC_TOS_BUCKET}/${target_key}" \
              --endpoint-url "$ENDPOINT_URL" \
              --acl public-read \
              --cache-control "$cache_control" \
              --only-show-errors
          }

          for file in release-mac/* release-win/* release-linux/*; do
            [ -f "$file" ] || continue

            name="$(basename "$file")"
            cache_control="public, max-age=31536000, immutable"
            case "$name" in
              latest*.yml)
                cache_control="no-cache, no-store, must-revalidate, max-age=0"
                ;;
            esac

            upload_file "$file" "update/$name" "$cache_control"
          done

      - name: Verify published update metadata
        if: env.VOLC_TOS_ACCESS_KEY_ID != '' && env.VOLC_TOS_SECRET_ACCESS_KEY != '' && env.VOLC_TOS_BUCKET != '' && env.VOLC_TOS_REGION != '' && env.XIAOBA_UPDATE_BASE_URL != ''
        run: |
          set -euo pipefail

          for file in latest.yml latest-mac.yml latest-linux.yml; do
            url="${XIAOBA_UPDATE_BASE_URL}/${file}"
            status="$(curl -I -L -s -o /dev/null -w "%{http_code}" "$url")"
            if [ "$status" != "200" ]; then
              echo "Metadata check failed for $url (HTTP $status)"
              exit 1
            fi
          done
